name: miniodp
channels:
  - conda-forge
  - bioconda
  - nodefaults
dependencies:
  - python=3.11
  - pip

  # Common dependencies for data analysis / batch scripts
  # magic-impute currently pulls scprep, which requires pandas < 2.1
  - numpy>=1.24,<2
  - pandas>=2.0,<2.1
  - scipy>=1.11
  - scikit-learn
  - scanpy>=1.9
  - anndata>=0.10,<0.12
  - r-signac
  - magic-impute  # Conda package name, corresponds to PyPI's magic-imputation

  # File I/O
  - pyarrow>=12.0
  - h5py>=3.10
  - pytables>=3.9
  - pybigwig>=0.3.22
  - tomlkit>=0.13

  # Other common tools
  - psutil
  - rpy2
  - samtools
  - stringtie
  - gffread
  - dash>=2.14.2
  - dash-bootstrap-components>=1.5.0
  - plotly>=5.15.0
  - gunicorn>=21.2.0
  - flask-caching>=2.1.0
  - diskcache>=5.6.3
  - multiprocess>=0.70.16

  # Pip is kept only for packages not available from conda-forge/bioconda
  - pip:
      - kaleido>=0.2.1
