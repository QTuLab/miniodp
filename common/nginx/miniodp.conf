# This file provides location blocks for /miniodp/*. Include it in your main server block.
#
# Suggested usage in /etc/nginx/sites-available/[your-site].conf server block:
#     include /etc/nginx/miniodp/miniodp.conf;
# Then apply with `sudo nginx -t && sudo systemctl reload nginx`.

# Hugo static site:
# - 301 permanent redirect from /miniodp to /miniodp/
# - alias points to synced static directory
# - try_files ensures Hugo SPA routing falls back to index.html
location = /miniodp {
    return 301 /miniodp/;
}
location /miniodp/ {
    alias /opt/miniodp/hugo/public/;
    try_files $uri $uri/ /miniodp/index.html;
}

# JBrowse 2 static resources
# add_header allows CORS for iframe embedding.
location = /miniodp/jbrowse2 {
    return 301 /miniodp/jbrowse2/;
}
location /miniodp/jbrowse2/ {
    root /opt;
    add_header Access-Control-Allow-Origin "*" always;
    try_files $uri $uri/ =404;
}

# Dash reverse proxy
location /miniodp/dash/ {
    # No trailing slash
    proxy_pass http://127.0.0.1:3939;

    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_redirect off;
}

# SequenceServer reverse proxy
location /miniodp/sequenceserver/ {
    # Proxy pass with trailing slash to strip path prefix
    proxy_pass http://127.0.0.1:4567/;

    # Pass necessary headers
    proxy_set_header Host $http_host; # $http_host includes port number, more robust than $host
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Match absolute path redirects with domain:
    # Replace "http://your-domain/" returned by backend with "/miniodp/sequenceserver/"
    proxy_redirect http://$http_host/ /miniodp/sequenceserver/;

    # Match HTTPS
    proxy_redirect https://$http_host/ /miniodp/sequenceserver/;

    # Relative path match (may not be needed)
    #proxy_redirect / /miniodp/sequenceserver/;
}

# Simple health check endpoint for external monitoring.
location = /miniodp/healthz {
    return 200 "ok\n";
}
